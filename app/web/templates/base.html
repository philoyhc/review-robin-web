<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}Review Robin Web{% endblock %}</title>
    {# Favicon: inline SVG data URI. Edit the emoji or the SVG markup below to change it. #}
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>">
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        margin: 40px;
        max-width: 1400px;
        color: #222;
        line-height: 1.35;
      }
      body.narrow { max-width: 800px; }
      p { margin: 0 0 6px 0; }
      h1, h2, h3, h4, h5, h6 { margin: 12px 0 6px 0; line-height: 1.25; }
      ul, ol, dl { margin: 0 0 6px 0; }
      li { margin-bottom: 2px; }
      .table-scroll { overflow-x: auto; }
      .pill.pill-handle {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #f3f4f6;
        color: #374151;
        text-transform: none;
        font-weight: 500;
      }
      .help-preview {
        white-space: pre-wrap;
        font-size: 0.9em;
        color: #444;
        margin: 0;
      }
      .help-block dt { font-weight: 600; margin-top: 8px; }
      .help-block dd {
        margin: 0 0 8px 0;
        white-space: pre-wrap;
        color: #444;
      }
      .warning-banner {
        border: 1px solid #f59e0b;
        background: #fef3c7;
        color: #92400e;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      .danger-banner {
        border: 1px solid #b91c1c;
        background: #fee2e2;
        color: #991b1b;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      h1 { margin-top: 0; margin-bottom: 0; }
      .page-subtitle {
        margin: 2px 0 12px 0;
        color: #555;
        font-size: 0.95em;
      }
      a { color: #2563eb; }
      .chrome {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 1px solid #eee;
        padding-bottom: 12px;
        margin-bottom: 24px;
        gap: 16px;
      }
      .chrome-left { display: flex; flex-direction: column; gap: 4px; }
      .chrome-app-identity {
        font-size: 0.85em;
        color: #555;
        text-decoration: none;
      }
      .chrome-app-identity:hover { text-decoration: underline; }
      .breadcrumb { font-size: 0.95em; }
      .breadcrumb a { color: #2563eb; text-decoration: none; }
      .breadcrumb a:hover { text-decoration: underline; }
      .breadcrumb span[aria-current="page"] { color: #222; font-weight: 600; }
      .breadcrumb-sep { color: #999; margin: 0 6px; }
      .chrome-user {
        font-size: 0.85em;
        color: #555;
        text-align: right;
        line-height: 1.4;
      }
      .chrome-user .signout {
        display: inline-block;
        margin-top: 4px;
        padding: 4px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        text-decoration: none;
        color: #222;
        font-size: 0.9em;
      }
      .chrome-user .signout:hover { background: #f4f4f4; }
      .card {
        border: 2px solid #bbb;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .card h2 { margin-top: 0; font-size: 1.15rem; }
      table { border-collapse: collapse; width: 100%; }
      th, td {
        border: 1px solid #ddd;
        padding: 4px 8px;
        text-align: left;
        vertical-align: middle;
      }
      th { background: #f4f4f4; }
      .muted { color: #777; }
      .btn, button.btn, a.btn {
        display: inline-block;
        padding: 8px 14px;
        border: 1px solid #2563eb;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        font-size: 0.95em;
        cursor: pointer;
      }
      .btn.secondary {
        background: #fff;
        color: #2563eb;
      }
      .btn.danger {
        background: #fff;
        color: #b91c1c;
        border-color: #b91c1c;
      }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input[type="text"], textarea, input[type="datetime-local"] {
        width: 100%;
        padding: 8px;
        font-size: 1em;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-family: inherit;
      }
      textarea { min-height: 80px; }
      .pill {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 999px;
        font-size: 0.8em;
        font-weight: 600;
        text-transform: uppercase;
        margin-right: 6px;
      }
      .pill-error { background: #fee2e2; color: #991b1b; }
      .pill-warning { background: #fef3c7; color: #92400e; }
      .pill-info { background: #dbeafe; color: #1e40af; }
      .session-meta-row {
        display: flex;
        gap: 16px;
        margin: 0 0 6px 0;
      }
      .session-meta-row > div { flex: 1; }
      .session-status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 6px 0 0 0;
      }
      .btn-cta {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px 14px;
        border: 1px solid #2563eb;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        text-align: center;
        font-size: 0.95em;
        font-weight: 700;
        line-height: 1.25;
        cursor: pointer;
      }
      .btn-cta.disabled {
        background: #9ca3af;
        border-color: #9ca3af;
        cursor: not-allowed;
      }
      .btn-row {
        display: flex;
        gap: 16px;
        margin: 0;
      }
      .btn-row > * { flex: 1; }
      .setup-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        column-gap: 16px;
        row-gap: 10px;
        align-items: center;
      }
      .setup-grid > .btn-cta { grid-column: 1; }
      .setup-grid > .setup-content { grid-column: 2 / -1; }
      .page-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: stretch;
        margin-bottom: 20px;
      }
      .page-grid .card { margin-bottom: 0; }
      .col-left {
        display: flex;
        flex-direction: column;
        gap: 20px;
        justify-content: space-between;
      }
      .col-right {
        display: flex;
        flex-direction: column;
      }
      .col-right > .card { flex: 1; }
      .card-half { max-width: calc(50% - 10px); box-sizing: border-box; }
      #danger-zone button.btn { width: 200px; }
      @media (max-width: 800px) {
        .page-grid { grid-template-columns: 1fr; }
        .card-half { max-width: 100%; }
      }
    </style>
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <div class="chrome">
      <div class="chrome-left">
        <a class="chrome-app-identity" href="/about">Review Robin Web App (version {{ app_version }})</a>
        {% include "_partials/breadcrumb.html" %}
      </div>
      {% if user %}
        <div class="chrome-user">
          <div>Signed in as {{ user.display_name or user.email }}</div>
          <a class="signout" href="/.auth/logout">Sign out</a>
        </div>
      {% endif %}
    </div>

    {% block content %}{% endblock %}
  </body>
</html>
