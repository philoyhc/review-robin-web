<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}Review Robin Web{% endblock %}</title>
    {# Favicon: inline SVG data URI. Edit the emoji or the SVG markup below to change it. #}
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>">
    <style>
      html { font-size: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        margin: 40px;
        max-width: 1400px;
        color: #222;
        line-height: 1.35;
      }
      body.narrow { max-width: 800px; }
      p { margin: 0 0 6px 0; }
      h1, h2, h3, h4, h5, h6 { margin: 12px 0 6px 0; line-height: 1.25; }
      ul, ol, dl { margin: 0 0 6px 0; }
      li { margin-bottom: 2px; }
      .table-scroll { overflow-x: auto; }
      .pill.pill-handle {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #f3f4f6;
        color: #374151;
        text-transform: none;
        font-weight: 500;
      }
      .help-preview {
        white-space: pre-wrap;
        font-size: 0.9em;
        color: #444;
        margin: 0;
      }
      .help-block dt { font-weight: 600; margin-top: 8px; }
      .help-block dd {
        margin: 0 0 8px 0;
        white-space: pre-wrap;
        color: #444;
      }
      .warning-banner {
        border: 1px solid #f59e0b;
        background: #fef3c7;
        color: #92400e;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      .danger-banner {
        border: 1px solid #b91c1c;
        background: #fee2e2;
        color: #991b1b;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      h1 { margin-top: 0; margin-bottom: 16px; }
      .page-subtitle {
        margin: -12px 0 16px 0;
        color: #555;
        font-size: 0.95em;
      }
      a { color: #2563eb; }
      .chrome {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 1px solid #eee;
        padding-bottom: 12px;
        margin-bottom: 24px;
        gap: 16px;
      }
      .chrome-left { display: flex; flex-direction: column; gap: 4px; }
      .chrome-app-identity {
        font-size: 0.85em;
        color: #555;
        text-decoration: none;
      }
      .chrome-app-identity:hover { text-decoration: underline; }
      .breadcrumb { font-size: 0.95em; }
      .breadcrumb a { color: #2563eb; text-decoration: none; }
      .breadcrumb a:hover { text-decoration: underline; }
      .breadcrumb span[aria-current="page"] { color: #222; font-weight: 600; }
      .breadcrumb-sep { color: #999; margin: 0 6px; }
      .chrome-user {
        font-size: 0.85em;
        color: #555;
        text-align: right;
        line-height: 1.4;
      }
      .chrome-user .signout {
        display: inline-block;
        margin-top: 4px;
        padding: 4px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        text-decoration: none;
        color: #222;
        font-size: 0.9em;
      }
      .chrome-user .signout:hover { background: #f4f4f4; }
      .card {
        border: 2px solid #bbb;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .card h2 { margin-top: 0; font-size: 1.15rem; }
      table { border-collapse: collapse; width: 100%; }
      th, td {
        border: 1px solid #ddd;
        padding: 4px 8px;
        text-align: left;
        vertical-align: middle;
      }
      th { background: #f4f4f4; }
      th.col-shrink, td.col-shrink { width: 1%; white-space: nowrap; }
      .muted { color: #777; }
      .btn, button.btn, a.btn {
        display: inline-block;
        padding: 8px 14px;
        border: 1px solid #2563eb;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        text-align: center;
        font-family: inherit;
        font-size: 0.95em;
        line-height: 1.35;
        cursor: pointer;
      }
      .btn[hidden], button.btn[hidden], a.btn[hidden] { display: none; }
      .btn:disabled, button.btn:disabled, a.btn.disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn.secondary {
        background: #fff;
        color: #2563eb;
      }
      .btn.danger {
        background: #fff;
        color: #b91c1c;
        border-color: #b91c1c;
      }
      .btn.danger-solid {
        background: #b91c1c;
        color: #fff;
        border-color: #b91c1c;
      }
      .btn.alert {
        background: #fff;
        color: #d97706;
        border-color: #d97706;
      }
      .btn.alert-solid {
        background: #d97706;
        color: #fff;
        border-color: #d97706;
      }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input[type="text"], textarea, input[type="datetime-local"] {
        width: 100%;
        padding: 8px;
        font-size: 1em;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-family: inherit;
      }
      textarea { min-height: 80px; }
      .pill {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 999px;
        font-size: 0.8em;
        font-weight: 600;
        text-transform: uppercase;
        margin-right: 6px;
      }
      .pill-error { background: #fee2e2; color: #991b1b; }
      .pill-warning { background: #fef3c7; color: #92400e; }
      .pill-info { background: #dbeafe; color: #1e40af; }
      .pill-success { background: #dcfce7; color: #166534; }
      .session-meta-row {
        display: flex;
        gap: 16px;
        margin: 0 0 6px 0;
      }
      .session-meta-row > div { flex: 1; }
      .session-status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 6px 0 0 0;
      }
      .btn-cta {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px 14px;
        border: 1px solid #2563eb;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        text-align: center;
        font-size: 0.95em;
        line-height: 1.25;
        cursor: pointer;
      }
      .btn-cta.disabled {
        background: #9ca3af;
        border-color: #9ca3af;
        cursor: not-allowed;
      }
      .btn-row {
        display: flex;
        gap: 16px;
        margin: 0;
      }
      .btn-row > * { flex: 1; }
      .btn-icon {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0 2px;
        font-size: 0.8em;
        line-height: 1;
        color: #374151;
      }
      .btn-icon:disabled { opacity: 0.4; cursor: not-allowed; }
      .setup-nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .setup-nav > .btn {
        flex: 0 0 140px;
        box-sizing: border-box;
      }
      /* Session-scoped top card: two-row chrome with double-height
         Home anchor on the left. Implements the navigation model
         spec'd in `spec/ui_concept.md` "Navigation model".

         Layout:
         - `.session-nav-card` — outer wrapper with rounded corners.
         - `.session-nav-grid` — CSS grid with three columns
           (home anchor / row label / tab strip) and two rows. The
           home anchor cell spans both rows on the left.
         - `.row-label` — neutral-tinted left-edge label
           ("Setup" / "Operations") next to each tab strip.
         - `.tab-strip` — the row of phase tabs; each row carries
           a subtle tint (grey for setup, light green for ops).
         - `.status-row` — the setup-todo overview pills below
           the nav grid, same content across all session-scoped
           pages.

         Active tab is marked with a body-white background +
         bolder text + a short inset underline in a single unified
         colour (`--tab-marker-color`, blue by default). */
      .session-nav-card {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 20px;
        background: #fff;
      }
      .session-nav-grid {
        display: grid;
        grid-template-columns: minmax(180px, 220px) auto 1fr;
        grid-template-rows: auto auto;
        --tab-marker-color: #93c5fd;
      }
      /* Home anchor: spans both rows on the left, blue tint,
         shows a single centered "Session Home" label. (Session
         name lives in the page <title>, the chrome's `title`
         tooltip, and is otherwise one click away on the
         Operator's Overview.) */
      .session-home-anchor {
        grid-column: 1;
        grid-row: 1 / span 2;
        background: #eff6ff;
        border-right: 1px solid #d1d5db;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        text-decoration: none;
        color: #111827;
        position: relative;
      }
      .session-home-anchor:hover { background: #dbeafe; }
      .session-home-anchor.active { background: #fff; }
      .session-home-anchor.active::after {
        content: "";
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 0;
        height: 4px;
        background: var(--tab-marker-color);
        border-radius: 2px;
      }
      .home-anchor-text {
        font-size: 1rem;
        font-weight: 600;
        color: #111827;
      }
      /* Row labels — neutral, sit between Home and the tab strip.
         Both cells share the auto-sized column, so the cell width
         is dictated by the longer label ("Operations"); text inside
         is right-aligned so the shorter label ("Setup") sits flush
         against the first tab. */
      .row-label {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 12px 16px;
        font-size: 0.78rem;
        font-weight: 700;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        white-space: nowrap;
        background: #fff;
        border-right: 1px solid #e5e7eb;
      }
      /* Understated right-arrow after each row label, pointing
         from the label toward the tabs it labels. CSS-drawn
         triangle (rather than the Unicode glyph U+25B8 which
         renders smaller than the em box) so the triangle's
         height matches the surrounding cap-height. */
      .row-label::after {
        content: "";
        display: inline-block;
        margin-left: 10px;
        width: 0;
        height: 0;
        border-top: 0.5em solid transparent;
        border-bottom: 0.5em solid transparent;
        border-left: 0.55em solid #cbd5e1;
        vertical-align: middle;
      }
      /* Emphasised state for the row-label of the active group:
         applies when the operator is on a page in that group OR
         when hovering any tab in that group's strip. The label
         text and its arrow darken to match the session-name
         colour in the Home anchor. */
      .row-label.active-group,
      .session-nav-grid:has(.tab-strip-setup .nav-tab:hover) .row-label.setup-row,
      .session-nav-grid:has(.tab-strip-ops .nav-tab:hover) .row-label.ops-row {
        color: #111827;
      }
      .row-label.active-group::after,
      .session-nav-grid:has(.tab-strip-setup .nav-tab:hover) .row-label.setup-row::after,
      .session-nav-grid:has(.tab-strip-ops .nav-tab:hover) .row-label.ops-row::after {
        border-left-color: #111827;
      }
      /* Tab strip rows — group tint sits on the strip itself.
         Setup row sits in grid row 1; Operations row in row 2. */
      .tab-strip {
        display: flex;
        align-items: stretch;
      }
      .tab-strip-setup { background: #f3f4f6; grid-column: 3; grid-row: 1; }
      .tab-strip-ops   { background: #f0fdf4; grid-column: 3; grid-row: 2; }
      .row-label.setup-row { grid-column: 2; grid-row: 1; }
      .row-label.ops-row   { grid-column: 2; grid-row: 2; }
      /* Setup row gets a bottom border to separate from Ops row. */
      .session-nav-grid > .row-setup { border-bottom: 1px solid #d1d5db; }
      /* Phase tabs — same shape across both rows. */
      .nav-tab {
        flex: 1 1 0;
        padding: 12px 14px;
        text-align: center;
        color: #4b5563;
        text-decoration: none;
        font-size: 0.92rem;
        background: transparent;
        position: relative;
      }
      .nav-tab:hover {
        background: rgba(255, 255, 255, 0.7);
        color: #1f2937;
      }
      .nav-tab.active {
        background: #fff;
        color: #1e40af;
        font-weight: 500;
      }
      .nav-tab.active::after {
        content: "";
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 0;
        height: 4px;
        background: var(--tab-marker-color);
        border-radius: 2px;
      }
      .status-row {
        padding: 12px 16px;
        font-size: 0.9rem;
        background: #fff;
        border-top: 1px solid #e5e7eb;
      }
      .status-row p { margin: 0; }
      .status-row p + p { margin-top: 4px; }
      .instrument-edit:has(details[open]) .description-text { display: none; }
      .instrument-edit details[open] > summary { display: none; }
      .display-edit[open] > summary { display: none; }
      .field-builder.locked details > summary { pointer-events: none; cursor: default; }
      .field-builder.locked details summary span[title="Edit"],
      .field-builder.locked a[title="Delete row"],
      .field-builder.locked a[title="Add row after"] { display: none; }
      .setup-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        column-gap: 16px;
        row-gap: 10px;
        align-items: center;
      }
      .setup-grid > .btn-cta { grid-column: 1; }
      .setup-grid > .setup-content { grid-column: 2 / -1; }
      .page-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: stretch;
        margin-bottom: 20px;
      }
      .page-grid .card { margin-bottom: 0; }
      .page-grid > .card-tl { grid-column: 1; grid-row: 1; }
      .page-grid > .card-r  { grid-column: 2; grid-row: 1 / span 2; }
      .page-grid > .card-bl { grid-column: 1; grid-row: 2; }
      .page-grid > .card-l  { grid-column: 1; grid-row: 1 / span 2; }
      .page-grid > .card-tr { grid-column: 2; grid-row: 1; }
      .page-grid > .card-br { grid-column: 2; grid-row: 2; }
      .bottom-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: start;
        margin-bottom: 20px;
      }
      .bottom-grid .card { margin-bottom: 0; }
      .bottom-left {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .fill-col {
        display: flex;
        flex-direction: column;
      }
      .fill-col > textarea {
        flex: 1;
        min-height: 0;
      }
      .btn-pair {
        display: flex;
        gap: 16px;
        align-items: stretch;
        flex-wrap: wrap;
      }
      .btn-pair > form { margin: 0; }
      .card-half { max-width: calc(50% - 10px); box-sizing: border-box; }
      #danger-zone button.btn { width: 200px; }
      @media (max-width: 800px) {
        .page-grid { grid-template-columns: 1fr; }
        .page-grid > .card-tl,
        .page-grid > .card-r,
        .page-grid > .card-bl,
        .page-grid > .card-l,
        .page-grid > .card-tr,
        .page-grid > .card-br {
          grid-column: 1;
          grid-row: auto;
        }
        .bottom-grid { grid-template-columns: 1fr; }
        .card-half { max-width: 100%; }
      }
    </style>
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <div class="chrome">
      <div class="chrome-left">
        <a class="chrome-app-identity" href="/about">Review Robin Web App (version {{ app_version }})</a>
        {% include "_partials/breadcrumb.html" %}
      </div>
      {% if user %}
        <div class="chrome-user">
          <div>Signed in as {{ user.display_name or user.email }}</div>
          <a class="signout" href="/.auth/logout">Sign out</a>
        </div>
      {% endif %}
    </div>

    {% block content %}{% endblock %}

    <script>
      // Operator-page convention: every redirect-back-with-banner card
      // (or any inline error / confirmation banner) carries the
      // ``banner-scroll-target`` class so the page can jump to it on
      // load. Without this the natural URL fragment may scroll the
      // operator past the banner (the banner sits at the top of the
      // page; the redirect URL fragment often points at the source
      // row). Smooth scroll on a small ``setTimeout`` so the natural
      // fragment-jump runs first; we override it. Cancel / dismiss
      // buttons on banners restore the source-row fragment, so
      // navigating away from the banner naturally returns the
      // operator to where they were before the jump. See
      // ``spec/assumptions.md`` "Inline error / warning banners".
      (function () {
        function scrollFirstBannerIntoView() {
          var banner = document.querySelector(".banner-scroll-target");
          if (!banner) return;
          // ``setTimeout`` lets the browser's native fragment-jump run
          // first; we then override.
          setTimeout(function () {
            banner.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 0);
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", scrollFirstBannerIntoView);
        } else {
          scrollFirstBannerIntoView();
        }
      })();
    </script>
  </body>
</html>
