<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}Review Robin Web{% endblock %}</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        margin: 40px;
        max-width: 900px;
        color: #222;
      }
      h1 { margin-top: 0; }
      a { color: #2563eb; }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        border-bottom: 1px solid #eee;
        padding-bottom: 12px;
        margin-bottom: 24px;
      }
      .topbar .who { color: #555; font-size: 0.9em; }
      .card {
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .card h2 { margin-top: 0; font-size: 1.15rem; }
      table { border-collapse: collapse; width: 100%; }
      th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
        vertical-align: top;
      }
      th { background: #f4f4f4; }
      .muted { color: #777; }
      .btn, button.btn, a.btn {
        display: inline-block;
        padding: 8px 14px;
        border: 1px solid #2563eb;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        font-size: 0.95em;
        cursor: pointer;
      }
      .btn.secondary {
        background: #fff;
        color: #2563eb;
      }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input[type="text"], textarea, input[type="datetime-local"] {
        width: 100%;
        padding: 8px;
        font-size: 1em;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-family: inherit;
      }
      textarea { min-height: 80px; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div><a href="/operator/sessions">Review Robin Web</a></div>
      <div class="who">
        {% if user %}
          Signed in as {{ user.display_name or user.email }}
          &middot; <a href="/.auth/logout">Sign out</a>
        {% endif %}
      </div>
    </div>

    {% block content %}{% endblock %}
  </body>
</html>
