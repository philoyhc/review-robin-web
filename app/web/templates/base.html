<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}Review Robin Web{% endblock %}</title>
    {# Favicon: inline SVG data URI. Edit the emoji or the SVG markup below to change it. #}
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>">
    <style>
      /* ──────────────────────────────────────────────────────────
         Design tokens — palette / type / spacing / radii.
         Defined as :root custom properties so they're available to
         every rule but inert until consumed. spec/visual_style_general.md
         is the source of truth for these values.
         ────────────────────────────────────────────────────────── */
      :root {
        /* Neutrals */
        --bg-page: #ffffff;
        --bg-muted: #f5f5f7;
        --border-subtle: #e5e7eb;
        --border-default: #d1d5db;
        --neutral-marker: #d1d5db;
        --text-primary: #111827;
        --text-secondary: #6b7280;
        --text-muted: #9ca3af;
        /* Semantic accents (emphasis / background pairs) */
        --accent-blue: #2563eb;
        --accent-blue-bg: #dbeafe;
        --accent-blue-bg-soft: #eff6ff;
        --accent-blue-bg-faint: #fafcff;
        --accent-blue-light: #3b82f6;
        --accent-blue-dark: #1d4ed8;
        --accent-blue-marker: #93c5fd;
        --accent-green: #059669;
        --accent-green-bg: #d1fae5;
        --accent-green-marker: #a7f3d0;
        --accent-amber: #d97706;
        --accent-amber-bg: #fef3c7;
        --accent-amber-bg-mid: #fde68a;
        --accent-amber-dark: #92400e;
        --accent-red: #dc2626;
        --accent-red-bg: #fee2e2;
        --accent-red-soft: #ef4444;
        /* Type scale */
        --fs-tiny: 0.75rem;
        --fs-small: 0.875rem;
        --fs-body: 1rem;
        --fs-h2: 1.125rem;
        --fs-h1: 1.5rem;
        /* Spacing scale (4px base) */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-6: 24px;
        --space-8: 32px;
        --space-12: 48px;
        --space-16: 64px;
        /* Radii */
        --radius-button: 6px;
        --radius-card: 8px;
        --radius-pill: 9999px;
      }
      html { font-size: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        margin: 40px;
        max-width: 1400px;
        color: #222;
        line-height: 1.35;
      }
      body.narrow { max-width: 800px; }
      p { margin: 0 0 6px 0; }
      h1, h2, h3, h4, h5, h6 { margin: 12px 0 6px 0; line-height: 1.25; }
      ul, ol, dl { margin: 0 0 6px 0; }
      li { margin-bottom: 2px; }
      .table-scroll { overflow-x: auto; }
      .pill.pill-handle {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #f3f4f6;
        color: #374151;
        text-transform: none;
        font-weight: 500;
      }
      .help-preview {
        white-space: pre-wrap;
        font-size: 0.9em;
        color: #444;
        margin: 0;
      }
      /*
       * Reviewer-surface help-text primitives — visual_style_general.md-aligned
       * bg-muted tinted blocks for the per-instrument response-field help
       * text. Two or more items render in a 2-col grid (rs-help-grid);
       * single-item case collapses to one full-width block
       * (.rs-help-card-solo).
       */
      .rs-help-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin: 0 0 16px 0;
      }
      .rs-help-card {
        background: #f5f5f7;
        padding: 10px 14px;
        border-radius: 6px;
        color: #444;
      }
      .rs-help-card strong { color: #111827; }
      .rs-help-card-solo { margin: 0 0 16px 0; }
      .warning-banner {
        border: 1px solid #f59e0b;
        background: #fef3c7;
        color: #92400e;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      .danger-banner {
        border: 1px solid #b91c1c;
        background: #fee2e2;
        color: #991b1b;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      h1 { margin-top: 0; margin-bottom: 16px; }
      .page-subtitle {
        margin: -12px 0 16px 0;
        color: #555;
        font-size: 0.95em;
      }
      a { color: #2563eb; }
      .chrome {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 1px solid #eee;
        padding-bottom: 12px;
        margin-bottom: 24px;
        gap: 16px;
      }
      .chrome-left { display: flex; flex-direction: column; gap: 4px; }
      .chrome-app-identity {
        font-size: 0.85em;
        color: #555;
        text-decoration: none;
      }
      .chrome-app-identity:hover { text-decoration: underline; }
      .breadcrumb { font-size: 0.95em; }
      .breadcrumb a { color: #2563eb; text-decoration: none; }
      .breadcrumb a:hover { text-decoration: underline; }
      .breadcrumb span[aria-current="page"] { color: #222; font-weight: 600; }
      .breadcrumb-sep { color: #999; margin: 0 6px; }
      .chrome-user {
        font-size: 0.85em;
        color: #555;
        text-align: right;
        line-height: 1.4;
      }
      .chrome-user .signout {
        display: inline-block;
        margin-top: 4px;
        padding: 4px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        text-decoration: none;
        color: #222;
        font-size: 0.9em;
      }
      .chrome-user .signout:hover { background: #f4f4f4; }
      .card {
        border: 2px solid #bbb;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .card h2 { margin-top: 0; font-size: 1.15rem; }
      table { border-collapse: collapse; width: 100%; }
      th, td {
        border: 1px solid #ddd;
        padding: 4px 8px;
        text-align: left;
        vertical-align: middle;
      }
      th { background: #f4f4f4; }
      th.col-shrink, td.col-shrink { width: 1%; white-space: nowrap; }
      /*
       * Reviewer-surface column-width hints. With table-layout: auto the
       * "width: 1%" idiom collapses a column to its content. .rs-textlong
       * gets no fixed width; the browser distributes leftover horizontal
       * space to it (and other unconstrained columns) — so long-text
       * textareas eat the slack while numeric inputs and Photo links stay
       * compact. .rs-reviewee caps the identity column at 20% so a long
       * reviewee name wraps instead of pushing the response inputs off
       * screen.
       */
      th.rs-narrow, td.rs-narrow { width: 1%; white-space: nowrap; }
      th.rs-reviewee, td.rs-reviewee {
        max-width: 20%;
        min-width: 8em;
        word-wrap: break-word;
        overflow-wrap: anywhere;
      }
      th.rs-textlong, td.rs-textlong { min-width: 14em; }
      .muted { color: #777; }
      /*
       * Note (2026-05-03): the .btn variants below (default / .secondary /
       * .danger / .danger-solid / .alert / .alert-solid) are the
       * high-contrast saturated palette that spec/visual_style_general.md retires.
       * spec/visual_style_general.md is now authoritative for button styling
       * (Primary / Secondary / Destructive on a muted, low-contrast
       * vocabulary). The CSS here has not been migrated yet — that's the
       * "First PR — button restyle" called out in unfinished_business.md
       * #21. Until that ships, the rules below remain live.
       */
      .btn, button.btn, a.btn {
        display: inline-block;
        padding: 8px 14px;
        border: 1px solid #2563eb;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        text-align: center;
        font-family: inherit;
        font-size: 0.95em;
        line-height: 1.35;
        cursor: pointer;
      }
      .btn[hidden], button.btn[hidden], a.btn[hidden] { display: none; }
      .btn:disabled, button.btn:disabled, a.btn.disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn.secondary {
        background: #fff;
        color: #2563eb;
      }
      .btn.danger {
        background: #fff;
        color: #b91c1c;
        border-color: #b91c1c;
      }
      .btn.danger-solid {
        background: #b91c1c;
        color: #fff;
        border-color: #b91c1c;
      }
      .btn.alert {
        background: #fff;
        color: #d97706;
        border-color: #d97706;
      }
      .btn.alert-solid {
        background: #d97706;
        color: #fff;
        border-color: #d97706;
      }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input[type="text"], textarea, input[type="datetime-local"] {
        width: 100%;
        padding: 8px;
        font-size: 1em;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-family: inherit;
      }
      textarea { min-height: 80px; }
      .pill {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 999px;
        font-size: 0.8em;
        font-weight: 600;
        text-transform: uppercase;
        margin-right: 6px;
      }
      .pill-error { background: #fee2e2; color: #991b1b; }
      .pill-warning { background: #fef3c7; color: #92400e; }
      .pill-info { background: #dbeafe; color: #1e40af; }
      .pill-success { background: #dcfce7; color: #166534; }
      .session-meta-row {
        display: flex;
        gap: 16px;
        margin: 0 0 6px 0;
      }
      .session-meta-row > div { flex: 1; }
      .session-status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 6px 0 0 0;
      }
      .btn-cta {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px 14px;
        border: 1px solid #2563eb;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        text-align: center;
        font-size: 0.95em;
        line-height: 1.25;
        cursor: pointer;
      }
      .btn-cta.disabled {
        background: #9ca3af;
        border-color: #9ca3af;
        cursor: not-allowed;
      }
      .btn-row {
        display: flex;
        gap: 16px;
        margin: 0;
      }
      .btn-row > * { flex: 1; }
      .btn-icon {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0 2px;
        font-size: 0.8em;
        line-height: 1;
        color: #374151;
      }
      .btn-icon:disabled { opacity: 0.4; cursor: not-allowed; }
      .setup-nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .setup-nav > .btn {
        flex: 0 0 140px;
        box-sizing: border-box;
      }
      /* Session-scoped top card: two-row chrome with double-height
         Home anchor on the left. Implements the navigation model
         spec'd in `spec/operator_ui_concept.md` "Navigation model".

         Layout:
         - `.session-nav-card` — outer wrapper with rounded corners.
         - `.session-nav-grid` — CSS grid with three columns
           (home anchor / row label / tab strip) and two rows. The
           home anchor cell spans both rows on the left.
         - `.row-label` — neutral-tinted left-edge label
           ("Setup" / "Operations") next to each tab strip.
         - `.tab-strip` — the row of phase tabs; each row carries
           a subtle tint (grey for setup, light green for ops).
         - `.status-row` — the setup-todo overview pills below
           the nav grid, same content across all session-scoped
           pages.

         Active tab is marked with a body-white background +
         bolder text + a short inset underline in a single unified
         colour (`--tab-marker-color`, blue by default). */
      .session-nav-card {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 20px;
        background: #fff;
      }
      .session-nav-grid {
        display: grid;
        grid-template-columns: minmax(180px, 220px) auto 1fr;
        grid-template-rows: auto auto;
        --tab-marker-color: #93c5fd;
      }
      /* Home anchor: spans both rows on the left, blue tint,
         shows a single centered "Session Home" label. (Session
         name lives in the page <title>, the chrome's `title`
         tooltip, and is otherwise one click away on the
         Operator's Overview.) */
      .session-home-anchor {
        grid-column: 1;
        grid-row: 1 / span 2;
        background: #eff6ff;
        border-right: 1px solid #d1d5db;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        text-decoration: none;
        color: #4b5563;
        position: relative;
      }
      .session-home-anchor:hover {
        background: #fafcff;
        color: #1f2937;
      }
      .session-home-anchor.active {
        background: #fff;
        color: #111827;
      }
      .session-home-anchor.active::after {
        content: "";
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 0;
        height: 4px;
        background: var(--tab-marker-color);
        border-radius: 2px;
      }
      .home-anchor-text {
        font-size: 1rem;
        font-weight: 600;
      }
      /* Row labels — neutral, sit between Home and the tab strip.
         Both cells share the auto-sized column, so the cell width
         is dictated by the longer label ("Operations"); text inside
         is right-aligned so the shorter label ("Setup") sits flush
         against the first tab. */
      .row-label {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 12px 16px;
        font-size: 0.78rem;
        font-weight: 700;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        white-space: nowrap;
        background: #fff;
        border-right: 1px solid #e5e7eb;
      }
      /* Understated right-arrow after each row label, pointing
         from the label toward the tabs it labels. CSS-drawn
         triangle (rather than the Unicode glyph U+25B8 which
         renders smaller than the em box) so the triangle's
         height matches the surrounding cap-height. */
      .row-label::after {
        content: "";
        display: inline-block;
        margin-left: 10px;
        width: 0;
        height: 0;
        border-top: 0.5em solid transparent;
        border-bottom: 0.5em solid transparent;
        border-left: 0.55em solid #cbd5e1;
        vertical-align: middle;
      }
      /* Emphasised state for the row-label of the active group:
         applies when the operator is on a page in that group OR
         when hovering any tab in that group's strip. The label
         text and its arrow darken to match the session-name
         colour in the Home anchor. */
      .row-label.active-group,
      .session-nav-grid:has(.tab-strip-setup .nav-tab:hover) .row-label.setup-row,
      .session-nav-grid:has(.tab-strip-ops .nav-tab:hover) .row-label.ops-row {
        color: #111827;
      }
      .row-label.active-group::after,
      .session-nav-grid:has(.tab-strip-setup .nav-tab:hover) .row-label.setup-row::after,
      .session-nav-grid:has(.tab-strip-ops .nav-tab:hover) .row-label.ops-row::after {
        border-left-color: #111827;
      }
      /* Tab strip rows — group tint sits on the strip itself.
         Setup row sits in grid row 1; Operations row in row 2. */
      .tab-strip {
        display: flex;
        align-items: stretch;
      }
      .tab-strip-setup { background: #f3f4f6; grid-column: 3; grid-row: 1; }
      .tab-strip-ops   { background: #f0fdf4; grid-column: 3; grid-row: 2; }
      .row-label.setup-row { grid-column: 2; grid-row: 1; }
      .row-label.ops-row   { grid-column: 2; grid-row: 2; }
      /* Setup row gets a bottom border to separate from Ops row. */
      .session-nav-grid > .row-setup { border-bottom: 1px solid #d1d5db; }
      /* Phase tabs — same shape across both rows. */
      .nav-tab {
        flex: 1 1 0;
        padding: 12px 14px;
        text-align: center;
        color: #4b5563;
        text-decoration: none;
        font-size: 0.92rem;
        background: transparent;
        position: relative;
      }
      .nav-tab:hover {
        background: rgba(255, 255, 255, 0.7);
        color: #1f2937;
      }
      .nav-tab.active {
        background: #fff;
        color: #1e40af;
        font-weight: 500;
      }
      .nav-tab.active::after {
        content: "";
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 0;
        height: 4px;
        background: var(--tab-marker-color);
        border-radius: 2px;
      }
      /* Per-row active-tab marker — match the row's tint family.
         Setup row sits on grey, so its marker is grey;
         Operations row sits on light green, so its marker is a
         less-saturated green. Specificity 0,3,1 wins over the
         global .nav-tab.active::after (0,2,1). Applies on both v1
         and v2 pages — the :root tokens are globally available. */
      .tab-strip-setup .nav-tab.active::after {
        background: var(--neutral-marker);
      }
      .tab-strip-ops .nav-tab.active::after {
        background: var(--accent-green-marker);
      }
      .status-row {
        padding: 12px 16px;
        font-size: 0.9rem;
        background: #fff;
        border-top: 1px solid #e5e7eb;
      }
      .status-row p { margin: 0; }
      .status-row p + p { margin-top: 4px; }
      .instrument-edit:has(details[open]) .description-text { display: none; }
      .instrument-edit details[open] > summary { display: none; }
      .display-edit[open] > summary { display: none; }
      .field-builder.locked details > summary { pointer-events: none; cursor: default; }
      .field-builder.locked details summary span[title="Edit"],
      .field-builder.locked a[title="Delete row"],
      .field-builder.locked a[title="Add row after"] { display: none; }
      .setup-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        column-gap: 16px;
        row-gap: 10px;
        align-items: center;
      }
      .setup-grid > .btn-cta { grid-column: 1; }
      .setup-grid > .setup-content { grid-column: 2 / -1; }
      .page-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: stretch;
        margin-bottom: 20px;
      }
      .page-grid .card { margin-bottom: 0; }
      .page-grid > .card-tl { grid-column: 1; grid-row: 1; }
      .page-grid > .card-r  { grid-column: 2; grid-row: 1 / span 2; }
      .page-grid > .card-bl { grid-column: 1; grid-row: 2; }
      .page-grid > .card-l  { grid-column: 1; grid-row: 1 / span 2; }
      .page-grid > .card-tr { grid-column: 2; grid-row: 1; }
      .page-grid > .card-br { grid-column: 2; grid-row: 2; }
      .bottom-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: start;
        margin-bottom: 20px;
      }
      .bottom-grid .card { margin-bottom: 0; }
      .bottom-left {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .fill-col {
        display: flex;
        flex-direction: column;
      }
      .fill-col > textarea {
        flex: 1;
        min-height: 0;
      }
      .btn-pair {
        display: flex;
        gap: 16px;
        align-items: stretch;
        flex-wrap: wrap;
      }
      .btn-pair > form { margin: 0; }
      .card-half { max-width: calc(50% - 10px); box-sizing: border-box; }
      #danger-zone button.btn { width: 200px; }
      @media (max-width: 800px) {
        .page-grid { grid-template-columns: 1fr; }
        .page-grid > .card-tl,
        .page-grid > .card-r,
        .page-grid > .card-bl,
        .page-grid > .card-l,
        .page-grid > .card-tr,
        .page-grid > .card-br {
          grid-column: 1;
          grid-row: auto;
        }
        .bottom-grid { grid-template-columns: 1fr; }
        .card-half { max-width: 100%; }
      }
      /* ──────────────────────────────────────────────────────────
         v2 — pilot of spec/ui_elements.md canonical primitives.
         Activated by `body.ui-v2`. Only affects pages that opt in
         by overriding the body_class block to "ui-v2". The first
         page on it is operator/session_reviewers1.html. Once the
         pilot proves out, these rules will be promoted to default
         and the wrapper retired. See spec/ui_elements.md Part 3
         for the rollout plan (PRs A → G).
         ────────────────────────────────────────────────────────── */
      body.ui-v2 {
        color: var(--text-primary);
      }
      body.ui-v2 a { color: var(--accent-blue); }
      body.ui-v2 .muted { color: var(--text-secondary); }
      /* Headings */
      body.ui-v2 h1 {
        font-size: var(--fs-h1);
        font-weight: 600;
        line-height: 1.3;
        margin: 0 0 var(--space-4) 0;
      }
      body.ui-v2 h2 {
        font-size: var(--fs-h2);
        font-weight: 600;
        line-height: 1.3;
        margin: 0 0 var(--space-3) 0;
      }
      body.ui-v2 .page-subtitle {
        font-size: var(--fs-small);
        color: var(--text-secondary);
        margin: -8px 0 var(--space-4) 0;
      }
      /* Cards — default + lock + danger-zone variants.
         Default border is 2px so the card edge reads clearly; the
         color is `border-default` (one shade darker than the global
         visual_style suggestion) for the same reason. Variants
         flip color only. */
      body.ui-v2 .card {
        border: 2px solid var(--border-default);
        border-radius: var(--radius-card);
        background: var(--bg-page);
        padding: var(--space-4);
        margin-bottom: var(--space-4);
      }
      /* Page-grid / bottom-grid wrappers default to a 20px
         margin-bottom (off the spacing scale) — bring them onto
         space-4 so the gap below a grid matches the gap between
         two stacked cards. */
      body.ui-v2 .page-grid,
      body.ui-v2 .bottom-grid {
        margin-bottom: var(--space-4);
      }
      body.ui-v2 .card h2 {
        margin: 0 0 var(--space-3) 0;
      }
      body.ui-v2 .card.lock {
        border-color: var(--accent-amber-dark);
        background: var(--accent-amber-bg);
      }
      body.ui-v2 .card.danger-zone {
        border-color: var(--accent-amber-dark);
        background: var(--bg-page);
      }
      body.ui-v2 .card.danger-zone h2 {
        color: var(--accent-amber-dark);
      }
      /* Buttons — Primary / Secondary / Destructive vocabulary
         per spec/visual_style_general.md. Same shape, role expressed by
         tonal variation only. Primary is solid accent-blue and is
         reserved for the page's single main affirmative action
         (P1 — "color where it carries meaning"); routine submits
         like Upload should use Secondary. */
      body.ui-v2 .btn,
      body.ui-v2 button.btn,
      body.ui-v2 a.btn {
        display: inline-block;
        padding: var(--space-2) var(--space-4);
        border: 1px solid var(--accent-blue);
        border-radius: var(--radius-button);
        background: var(--accent-blue);
        color: #fff;
        text-decoration: none;
        text-align: center;
        font-family: inherit;
        font-size: var(--fs-small);
        font-weight: 500;
        line-height: 1.35;
        cursor: pointer;
      }
      body.ui-v2 .btn.secondary {
        background: var(--bg-page);
        color: var(--text-primary);
        border-color: var(--border-default);
      }
      body.ui-v2 .btn.destructive,
      body.ui-v2 .btn.danger-solid {
        background: var(--bg-page);
        color: var(--accent-red);
        border-color: var(--accent-red);
      }
      /* Spec collapses .alert-solid into Primary. */
      body.ui-v2 .btn.alert-solid {
        background: var(--accent-blue);
        border-color: var(--accent-blue);
        color: #fff;
      }
      /* Alert (outline brown) — for the recovery action inside a
         lock card. Uses the same brown that frames the lock card
         so the action sits in the card's color family rather than
         clashing as a Primary blue would. */
      body.ui-v2 .btn.alert {
        background: var(--bg-page);
        color: var(--accent-amber-dark);
        border-color: var(--accent-amber-dark);
      }
      /* Hover — signal interactivity by tonal step on-palette.
         Convention (matches the chrome's Home anchor pattern):
         filled buttons LIGHTEN on hover; outline buttons darken
         with a subtle background tint. Disabled buttons skip via
         `pointer-events: none` below. */
      body.ui-v2 .btn:hover,
      body.ui-v2 button.btn:hover,
      body.ui-v2 a.btn:hover {
        background: var(--accent-blue-light);
        border-color: var(--accent-blue-light);
        color: #fff;
      }
      body.ui-v2 .btn.secondary:hover {
        background: var(--bg-muted);
        color: var(--text-primary);
        border-color: var(--border-default);
      }
      body.ui-v2 .btn.destructive:hover,
      body.ui-v2 .btn.danger-solid:hover {
        background: var(--accent-red-bg);
        color: var(--accent-red);
        border-color: var(--accent-red);
      }
      body.ui-v2 .btn.alert-solid:hover {
        background: var(--accent-blue-light);
        border-color: var(--accent-blue-light);
        color: #fff;
      }
      body.ui-v2 .btn.alert:hover {
        background: var(--accent-amber-bg-mid);
        color: var(--accent-amber-dark);
        border-color: var(--accent-amber-dark);
      }
      /* CTA — Primary style applied to the layout-and-prominence
         .btn-cta variant. Same token palette + hover convention as
         body.ui-v2 .btn (filled lightens on hover); the layout
         properties (flex centering, multi-line label support) come
         from the v1 .btn-cta rule above and aren't repeated. */
      body.ui-v2 .btn-cta {
        background: var(--accent-blue);
        border-color: var(--accent-blue);
        color: #fff;
      }
      body.ui-v2 .btn-cta:hover {
        background: var(--accent-blue-light);
        border-color: var(--accent-blue-light);
        color: #fff;
      }
      body.ui-v2 .btn-cta.disabled,
      body.ui-v2 .btn-cta[aria-disabled="true"] {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
        background: var(--accent-blue);
        border-color: var(--accent-blue);
      }
      /* Unified disabled state — covers <button disabled>,
         <a class="btn disabled"> and aria-disabled. */
      body.ui-v2 .btn:disabled,
      body.ui-v2 button.btn:disabled,
      body.ui-v2 a.btn.disabled,
      body.ui-v2 .btn[aria-disabled="true"] {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
      }
      /* Tables — row-only borders, generous padding, muted header,
         no zebra. Subtle hover tint. */
      body.ui-v2 table {
        border-collapse: collapse;
        width: 100%;
      }
      body.ui-v2 th,
      body.ui-v2 td {
        border: 0;
        border-bottom: 1px solid var(--border-subtle);
        padding: var(--space-3) var(--space-4);
        text-align: left;
        vertical-align: middle;
      }
      body.ui-v2 th {
        background: var(--bg-muted);
        color: var(--text-secondary);
        font-size: var(--fs-small);
        font-weight: 500;
      }
      body.ui-v2 tbody tr:hover { background: var(--bg-muted); }
      body.ui-v2 th.col-shrink,
      body.ui-v2 td.col-shrink {
        width: 1%;
        white-space: nowrap;
      }
      /* Forms — input padding 8/12, tokenized borders, labels at
         medium weight with 4px gap, .form-help / .form-error for
         supporting text. */
      body.ui-v2 label {
        display: block;
        margin: var(--space-3) 0 var(--space-1) 0;
        font-weight: 500;
        font-size: var(--fs-small);
        color: var(--text-primary);
      }
      body.ui-v2 input[type="text"],
      body.ui-v2 input[type="datetime-local"],
      body.ui-v2 input[type="number"],
      body.ui-v2 input[type="email"],
      body.ui-v2 input[type="file"],
      body.ui-v2 textarea,
      body.ui-v2 select {
        width: 100%;
        padding: var(--space-2) var(--space-3);
        font-size: var(--fs-body);
        font-family: inherit;
        box-sizing: border-box;
        border: 1px solid var(--border-default);
        border-radius: var(--radius-button);
        background: var(--bg-page);
        color: var(--text-primary);
      }
      body.ui-v2 input[type="text"]:focus,
      body.ui-v2 input[type="datetime-local"]:focus,
      body.ui-v2 input[type="number"]:focus,
      body.ui-v2 input[type="email"]:focus,
      body.ui-v2 textarea:focus,
      body.ui-v2 select:focus {
        outline: none;
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 1px var(--accent-blue-bg);
      }
      body.ui-v2 .form-help {
        font-size: var(--fs-small);
        color: var(--text-secondary);
        margin: var(--space-1) 0 var(--space-3) 0;
      }
      body.ui-v2 .form-error {
        font-size: var(--fs-small);
        color: var(--accent-red);
        margin: var(--space-1) 0 0 0;
      }
      /* Code block — bg-muted-tinted block for monospace content
         (e.g. rendered email bodies on the Outbox page). */
      body.ui-v2 .code-block {
        background: var(--bg-muted);
        padding: var(--space-3);
        border-radius: var(--radius-button);
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: var(--fs-small);
        color: var(--text-primary);
        margin: 0;
      }
      /* Pills — count (blue tint, bold dark text) for normal
         reporting, empty (yellow tint, bold red text) for missing
         data, plus four lifecycle variants. .pill-info maps to
         count and .pill-warning maps to empty so existing markup
         picks up the new treatment. */
      body.ui-v2 .pill {
        display: inline-block;
        padding: 2px var(--space-2);
        border-radius: var(--radius-pill);
        font-size: var(--fs-tiny);
        font-weight: 500;
        text-transform: uppercase;
        margin-right: var(--space-1);
      }
      body.ui-v2 .pill-count,
      body.ui-v2 .pill.pill-info {
        background: var(--accent-blue-bg);
        color: var(--text-primary);
      }
      body.ui-v2 .pill-empty,
      body.ui-v2 .pill.pill-warning {
        background: var(--accent-amber-bg);
        color: var(--accent-amber-dark);
      }
      /* draft = "not ready for action" — same warning treatment as
         .pill-empty so the status badge reads as "needs work". */
      body.ui-v2 .pill-lifecycle-draft {
        background: var(--accent-amber-bg);
        color: var(--accent-amber-dark);
      }
      body.ui-v2 .pill-lifecycle-closed {
        background: var(--bg-muted);
        color: var(--text-secondary);
      }
      body.ui-v2 .pill-lifecycle-validated {
        background: var(--accent-blue-bg);
        color: var(--accent-blue);
      }
      body.ui-v2 .pill-lifecycle-ready {
        background: var(--accent-green-bg);
        color: var(--accent-green);
      }
      /* Banners — single .banner shell + four semantic variants.
         Defined for completeness; not rendered on this page. */
      body.ui-v2 .banner {
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-card);
        padding: var(--space-3) var(--space-4);
        margin-bottom: var(--space-4);
      }
      body.ui-v2 .banner.banner-info {
        border-color: var(--accent-blue);
        background: var(--accent-blue-bg);
      }
      body.ui-v2 .banner.banner-success {
        border-color: var(--accent-green);
        background: var(--accent-green-bg);
      }
      body.ui-v2 .banner.banner-warning {
        border-color: var(--accent-amber);
        background: var(--accent-amber-bg);
      }
      body.ui-v2 .banner.banner-error {
        border-color: var(--accent-red);
        background: var(--accent-red-bg);
      }
      /* Chrome — repaint to palette tokens; per-row accent on the
         active-tab marker; row tints at 5% accent. */
      body.ui-v2 .chrome { border-bottom-color: var(--border-subtle); }
      body.ui-v2 .chrome-app-identity { color: var(--text-secondary); }
      body.ui-v2 .chrome-user { color: var(--text-secondary); }
      body.ui-v2 .chrome-user .signout {
        border-color: var(--border-default);
        color: var(--text-primary);
      }
      body.ui-v2 .breadcrumb-sep { color: var(--text-muted); }
      body.ui-v2 .breadcrumb span[aria-current="page"] {
        color: var(--text-primary);
      }
      body.ui-v2 .session-nav-card {
        border-color: var(--border-subtle);
      }
      body.ui-v2 .session-home-anchor {
        background: var(--accent-blue-bg-soft);
        border-right-color: var(--border-subtle);
        color: var(--text-secondary);
      }
      body.ui-v2 .session-home-anchor:hover {
        background: var(--accent-blue-bg-faint);
        color: var(--text-primary);
      }
      body.ui-v2 .session-home-anchor.active {
        background: var(--bg-page);
        color: var(--text-primary);
      }
      body.ui-v2 .row-label {
        border-right-color: var(--border-subtle);
        color: var(--text-muted);
      }
      /* Row-label emphasis — applies when the operator is on a
         page in this group OR when hovering any tab in the group's
         strip. The v1 :has() rules are shadowed by the v2 base
         row-label rule on equal specificity, so we re-emit them
         under body.ui-v2 to win on source order. */
      body.ui-v2 .row-label.active-group,
      body.ui-v2 .session-nav-grid:has(.tab-strip-setup .nav-tab:hover) .row-label.setup-row,
      body.ui-v2 .session-nav-grid:has(.tab-strip-ops .nav-tab:hover) .row-label.ops-row {
        color: var(--text-primary);
      }
      body.ui-v2 .row-label.active-group::after,
      body.ui-v2 .session-nav-grid:has(.tab-strip-setup .nav-tab:hover) .row-label.setup-row::after,
      body.ui-v2 .session-nav-grid:has(.tab-strip-ops .nav-tab:hover) .row-label.ops-row::after {
        border-left-color: var(--text-primary);
      }
      body.ui-v2 .tab-strip-setup { background: rgba(37, 99, 235, 0.05); }
      body.ui-v2 .tab-strip-ops   { background: rgba(5, 150, 105, 0.05); }
      body.ui-v2 .session-nav-grid > .row-setup {
        border-bottom-color: var(--border-subtle);
      }
      body.ui-v2 .nav-tab { color: var(--text-muted); font-weight: 600; }
      /* Hover emphasises the tab text; the v1 :hover rule is
         shadowed by the v2 base on equal specificity, so re-emit. */
      body.ui-v2 .nav-tab:hover {
        color: var(--text-primary);
        background: rgba(255, 255, 255, 0.7);
      }
      body.ui-v2 .nav-tab.active { color: var(--text-primary); }
      /* Active-tab underline — match the row's tint family. Setup
         row tints grey, so its marker is grey (--neutral-marker);
         Operations row tints green, so its marker is the
         less-saturated --accent-green-marker. Same logic as v1's
         per-row markers above — these v2-scoped rules just keep
         the cascade tidy if v2-only tokens diverge later. */
      body.ui-v2 .tab-strip-setup .nav-tab.active::after {
        background: var(--neutral-marker);
      }
      body.ui-v2 .tab-strip-ops .nav-tab.active::after {
        background: var(--accent-green-marker);
      }
      body.ui-v2 .session-home-anchor.active::after {
        background: var(--accent-blue-marker);
      }
      body.ui-v2 .status-row {
        background: var(--bg-page);
        border-top-color: var(--border-subtle);
        font-size: var(--fs-small);
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <div class="chrome">
      <div class="chrome-left">
        <a class="chrome-app-identity" href="/about">Review Robin Web App (version {{ app_version }})</a>
        {% include "_partials/breadcrumb.html" %}
      </div>
      {% if user %}
        <div class="chrome-user">
          <div>Signed in as {{ user.display_name or user.email }}</div>
          <a class="signout" href="/.auth/logout">Sign out</a>
        </div>
      {% endif %}
    </div>

    {% block content %}{% endblock %}

    <script>
      // Operator-page convention: every redirect-back-with-banner card
      // (or any inline error / confirmation banner) carries the
      // ``banner-scroll-target`` class so the page can jump to it on
      // load. Without this the natural URL fragment may scroll the
      // operator past the banner (the banner sits at the top of the
      // page; the redirect URL fragment often points at the source
      // row). Smooth scroll on a small ``setTimeout`` so the natural
      // fragment-jump runs first; we override it. Cancel / dismiss
      // buttons on banners restore the source-row fragment, so
      // navigating away from the banner naturally returns the
      // operator to where they were before the jump. See
      // ``spec/assumptions.md`` "Inline error / warning banners".
      (function () {
        function scrollFirstBannerIntoView() {
          var banner = document.querySelector(".banner-scroll-target");
          if (!banner) return;
          // ``setTimeout`` lets the browser's native fragment-jump run
          // first; we then override.
          setTimeout(function () {
            banner.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 0);
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", scrollFirstBannerIntoView);
        } else {
          scrollFirstBannerIntoView();
        }
      })();
    </script>
  </body>
</html>
