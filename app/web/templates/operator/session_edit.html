{% extends "base.html" %}

{% block title %}Edit {{ session.name }}{% endblock %}

{% block content %}
  <p><a href="/operator/sessions/{{ session.id }}">&larr; {{ session.name }}</a></p>

  <h1>Edit session</h1>

  <form method="post" action="/operator/sessions/{{ session.id }}/edit">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required maxlength="255" value="{{ session.name }}">

    <label for="code">Code</label>
    <input type="text" id="code" name="code" required maxlength="64" value="{{ session.code }}">

    <label for="description">Description</label>
    <textarea id="description" name="description" maxlength="2000">{{ session.description or "" }}</textarea>

    <label for="deadline">Deadline (optional)</label>
    <input
      type="datetime-local"
      id="deadline"
      name="deadline"
      value="{{ session.deadline.strftime('%Y-%m-%dT%H:%M') if session.deadline else '' }}"
    >

    <p style="margin-top: 20px;">
      <button class="btn" type="submit">Save changes</button>
      <a class="btn secondary" href="/operator/sessions/{{ session.id }}">Cancel</a>
    </p>
  </form>
{% endblock %}
